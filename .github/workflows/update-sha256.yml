name: Update SHA256 anchors

# Maintain ssh/install-duo-ssh.sh.sha256 alongside the script.  Hosts doing
# --update fetch this file as the canonical trust anchor; mirrors must serve
# matching content or be rejected.
#
# Also purges the jsDelivr CDN cache for both files after the commit lands,
# so CN users hitting jsDelivr don't see stale content for hours after a
# release (jsDelivr's `@<branch>` refs cache for ~12h by default, and the
# stale window is exactly when CDN-using hosts try to upgrade to whatever
# we just pushed).
#
# Triggers on every push to master and beta that touches the script.  The
# job's own commit ends with [skip ci] so it doesn't loop.

on:
  push:
    branches: [master, beta]
    paths: ['ssh/install-duo-ssh.sh']

jobs:
  update-hash:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        run: |
          set -euo pipefail
          HASH=$(sha256sum ssh/install-duo-ssh.sh | awk '{print $1}')
          printf '%s  install-duo-ssh.sh\n' "$HASH" > ssh/install-duo-ssh.sh.sha256
          echo "New hash: $HASH"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet ssh/install-duo-ssh.sh.sha256; then
            echo "Hash unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  "ops-scripts ci"
          git config user.email "noreply@kazuha-hub.invalid"
          git add ssh/install-duo-ssh.sh.sha256
          short=$(git rev-parse --short HEAD)
          git commit -m "Update SHA256 for install-duo-ssh.sh @ $short [skip ci]"
          git push origin "${{ github.ref_name }}"

      - name: Purge jsDelivr CDN cache
        if: always()
        run: |
          # Purge BOTH the script and its .sha256 from jsDelivr so the next
          # CDN-using host fetching either file gets the fresh content.  This
          # is best-effort — propagation across all edge PoPs is async and
          # can still take minutes — but it dramatically shrinks the window
          # during which the multi-anchor verifier sees disagreement.
          #
          # The purge endpoint is public, no auth, idempotent.  Failing here
          # is non-fatal (the .sha256 commit already landed; verification
          # falls back to canonical github which has no CDN cache).
          set -uo pipefail
          BRANCH="${{ github.ref_name }}"
          for path in ssh/install-duo-ssh.sh ssh/install-duo-ssh.sh.sha256; do
            url="https://purge.jsdelivr.net/gh/KazuhaHub/ops-scripts@${BRANCH}/${path}"
            echo "Purging $url"
            curl -fsS --max-time 15 "$url" || echo "(purge call failed — non-fatal)"
            echo
          done
